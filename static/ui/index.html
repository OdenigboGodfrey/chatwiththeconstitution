<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with the Constitution</title>
    <style>
        /* General reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            padding: 1rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid;
            transition: background-color 0.3s, border-color 0.3s;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow-y: auto;
            gap: 1rem;
            transition: background-color 0.3s;
        }

        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            transition: background-color 0.3s, color 0.3s;
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        footer {
            display: flex;
            padding: 0.5rem;
            border-top: 1px solid;
            transition: background-color 0.3s, border-color 0.3s;
        }

        #user-input {
            flex: 1;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: background-color 0.3s, color 0.3s;
        }

        #send-btn {
            border: none;
            padding: 0 1.5rem;
            margin-left: 0.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        /* Scrollbar styling */
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }

        #chat-container::-webkit-scrollbar-thumb {
            border-radius: 4px;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;

            align-items: flex-end;
        }

        .toast {
            width: fit-content;
            max-width: 320px;
            min-width: 280px;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.25s ease;
        }

        .toast.success {
            background: green;
        }

        .toast.error {
            background: #dc2626;
        }

        .toast.info {
            background: #2563eb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Light theme */
        @media (prefers-color-scheme: light) {
            body {
                background-color: #f0f0f0;
                color: #111;
            }

            header {
                background-color: #fff;
                border-color: #ccc;
            }

            #chat-container {
                background-color: #eaeaea;
            }

            .user-message {
                background-color: #ffffff;
                color: #000;
            }

            .bot-message {
                background-color: green;
                color: #fff;
            }

            footer {
                background-color: #fff;
                border-color: #ccc;
            }

            #user-input {
                background-color: #fff;
                color: #2c2c2c;
            }

            #send-btn {
                background-color: #2c2c2c;
                color: #fff;
            }

            #send-btn:hover {
                background-color: #2c2c2c;
            }

            #chat-container::-webkit-scrollbar-thumb {
                background-color: #999;
            }
        }

        /* Dark theme */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #fff;
            }

            header {
                background-color: #1f1f1f;
                border-color: #333;
            }

            #chat-container {
                background-color: #181818;
            }

            .user-message {
                background-color: #fff;
                color: #000
            }

            .bot-message {
                background-color: green;
                color: #fff
            }

            footer {
                background-color: #1f1f1f;
                border-color: #333;
            }

            #user-input {
                background-color: #2c2c2c;
                color: #fff;
            }

            #send-btn {
                background-color: #2c2c2c;
                color: #fff;
            }

            #send-btn:hover {
                background-color: #2c2c2c;
            }

            #chat-container::-webkit-scrollbar-thumb {
                background-color: #555;
            }
        }
    </style>
</head>

<body>
    <header>Chat with the Constitution</header>

    <div id="chat-container">
    </div>

    <footer>
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-btn">Send</button>
    </footer>
    <div class="toast-container" id="toastContainer"></div>
</body>

</html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"></script>
<script>
    let protocol = window.location.protocol;
    let port = window.location.port;
    let hostname = window.location.hostname;
    const endpoint = `/chat/with-history`;
    let GENERATE_ENDPOINT = `${protocol}//${hostname}${endpoint}`;
    let inMemoryChatHistory = [];
    if (protocol.startsWith('file:') || (!protocol && !hostname)) {
        // running as html file
        protocol = 'http:';
        hostname = 'localhost';
        port = 3000;
    }

    if (hostname === "localhost" || hostname === "127.0.0.1") {
        GENERATE_ENDPOINT = `${protocol}//${hostname}:${port}${endpoint}`;
    }

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    window.onload = () => {
        addMessage("Hello! Ask me anything about the Constitution or the Electoral Act, and I'll help you find the relevant provisions.", 'bot');
        userInput.focus();
    }

    function showToast(message, type = "info") {

        const container = document.getElementById("toastContainer");
        // create new toast div
        const toast = document.createElement("span");

        toast.className = `toast ${type}`;
        toast.innerText = message;
        // add toast to container
        container.appendChild(toast);

        setTimeout(() => {
            // auto remove toast after 4 seconds
            toast.remove();
        }, 4000);
    }

    function addMessage(message, type) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', type === 'user' ? 'user-message' : 'bot-message');

        // Create icon element
        const iconSpan = document.createElement('span');
        iconSpan.style.marginRight = '0.5rem';
        iconSpan.style.fontSize = '1.2rem';

        if (type === 'user') {
            iconSpan.textContent = '🧑🏿';
        } else if (type === 'system') {
            iconSpan.innerHTML = `
                <svg xmlns="http://w3.org" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle;">
                    <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1a8.45 8.45 0 0 0-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>
                </svg>
            `;
            //
            iconSpan.style.color = '#000000'; 
        }
        else {
            iconSpan.textContent = '📜'; // or 🤖
        }

        // Create message text span
        const textSpan = document.createElement('span');
        textSpan.innerHTML = message;

        // Append icon and text to message div
        msgDiv.appendChild(iconSpan);
        msgDiv.appendChild(textSpan);

        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        if (type === 'user' || type === 'bot') {
            // add only user or bot message to in-memory chat history
            inMemoryChatHistory.push({ content: message, role: type });
        }
    }

    function botResponse(userMsg) {
        return "According to the Constitution, " + userMsg;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) {
            showToast("Please enter a message", "error");
            return;
        }
        showToast(
            `Processing your request...`,
            "success"
        );
        // send message request
        const body = {
            "text": message,
            "history": inMemoryChatHistory
        };

        addMessage(message, 'user');
        userInput.value = '';

        const fullUrl = `${GENERATE_ENDPOINT}`;
        try {
            const response = await fetch(
                fullUrl,
                {
                    method: "POST",
                    body: JSON.stringify(body),
                    headers: {
                        "Content-Type": "application/json"
                    },
                }
            );

            if (!response.ok) {
                showToast(
                    `Failed to log request`,
                    "error"
                );
                // remove last message in chat history
                inMemoryChatHistory.pop();
                addMessage('Something went wrong while processing your request, please try again.', 'system');
                return;
            }

            const responseBody = await response.json();
            if (!responseBody.status) {
                showToast(responseBody.message, "error");
                inMemoryChatHistory.pop();
                addMessage(responseBody.message, 'system');
                return;
            }

            const rawHtml = marked.parse(responseBody.data);

            // 2. Sanitize the HTML to keep it safe
            const cleanHtml = DOMPurify.sanitize(rawHtml);
            addMessage(cleanHtml, 'bot');

            showToast(
                `Done!`,
                "success"
            );
        }
        catch (e) {
            console.error('sendMessage Error', e);
            const errorMessage = `Failed to log request. Please try again.`;
            showToast(
                errorMessage,
                "error"
            );
            inMemoryChatHistory.pop();
            addMessage(errorMessage, 'system');
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
